version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: etala_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=etala_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_local_secure_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: etala_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-local-key-placeholder
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - DATABASE_URL=postgres://postgres:postgres_local_secure_pass@db:5432/etala_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
