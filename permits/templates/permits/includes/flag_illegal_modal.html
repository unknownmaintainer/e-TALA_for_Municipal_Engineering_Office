<!-- Flag Illegal Construction Modal -->
<div class="modal fade" id="flagIllegalModal" tabindex="-1" aria-labelledby="flagIllegalModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden" style="background: var(--card-bg, #ffffff); max-height: 90vh;">
            <!-- Modal Header (Sticky Top) -->
            <div class="modal-header border-bottom py-3 px-4 flex-shrink-0" style="background: #fff5f5; border-color: #fee2e2 !important;">
                <div class="d-flex align-items-center gap-2.5">
                    <div class="rounded-circle p-2 d-flex align-items-center justify-content-center" style="background: #fee2e2; color: #dc2626; width: 36px; height: 36px; flex-shrink: 0;">
                        <i data-lucide="shield-alert" style="width: 18px; height: 18px;"></i>
                    </div>
                    <div>
                        <h5 class="modal-title fw-bold text-danger mb-0" id="flagIllegalModalLabel" style="font-size: 1.05rem;">
                            Flag Unpermitted Building / Structure
                        </h5>
                        <small class="text-muted d-block" style="font-size: 0.75rem;">
                            Municipal Engineering Office — Building Code Enforcement (P.D. 1096 Sec. 301)
                        </small>
                    </div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form method="POST" action="{% url 'flag_illegal_construction' %}" enctype="multipart/form-data" class="d-flex flex-column overflow-hidden flex-grow-1">
                {% csrf_token %}
                
                <!-- Scrollable Body (Guaranteed Smooth Scrolling) -->
                <div class="modal-body p-3.5 p-md-4 overflow-auto" style="max-height: 60vh;">
                    <div class="row g-3">
                        <!-- Section 1: Property Identification -->
                        <div class="col-12">
                            <div class="d-flex align-items-center justify-content-between border-bottom pb-1 mb-1">
                                <span class="fw-bold text-uppercase text-muted" style="letter-spacing: 0.5px; font-size: 0.72rem;">1. Property Identification</span>
                            </div>
                        </div>

                        <!-- Structure / Owner Title -->
                        <div class="col-md-8">
                            <label class="form-label fw-semibold text-dark small mb-1">
                                Property Owner / Title <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="title" class="form-control form-control-sm" placeholder="e.g., Unpermitted 2-Storey Building — Juan Dela Cruz" required style="border-radius: 6px; padding: 0.45rem 0.75rem;">
                        </div>

                        <!-- Notice of Violation / Order No. (Optional) -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-dark small mb-1">
                                NOV / Order No. <span class="text-muted fw-normal">(Optional)</span>
                            </label>
                            <input type="text" name="nov_number" class="form-control form-control-sm" placeholder="e.g., NOV-2026-042" style="border-radius: 6px; padding: 0.45rem 0.75rem;">
                        </div>

                        <!-- Section 2: Location & Evidence -->
                        <div class="col-12 mt-3">
                            <div class="d-flex align-items-center justify-content-between border-bottom pb-1 mb-1">
                                <span class="fw-bold text-uppercase text-muted" style="letter-spacing: 0.5px; font-size: 0.72rem;">2. Location &amp; Evidence</span>
                            </div>
                        </div>

                        <!-- Barangay -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-dark small mb-1">
                                Barangay Location <span class="text-danger">*</span>
                            </label>
                            <select name="barangay" class="form-select form-select-sm" required style="border-radius: 6px; padding: 0.45rem 0.75rem;">
                                <option value="" disabled selected>— Select Barangay —</option>
                                {% for b in barangays %}
                                <option value="{{ b.barangay_id }}">{{ b.barangay_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Date Discovered -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-dark small mb-1">
                                Date Discovered / Inspected <span class="text-danger">*</span>
                            </label>
                            <input type="date" name="date_discovered" class="form-control form-control-sm" value="{% now 'Y-m-d' %}" required style="border-radius: 6px; padding: 0.45rem 0.75rem;">
                        </div>

                        <!-- Specific Address / Location Details -->
                        <div class="col-12">
                            <label class="form-label fw-semibold text-dark small mb-1">
                                Address / Landmark Details
                            </label>
                            <input type="text" name="location_address" class="form-control form-control-sm" placeholder="e.g., Sitio Riverside, near Barangay Hall" style="border-radius: 6px; padding: 0.45rem 0.75rem;">
                        </div>

                        <!-- Initial Compliance Status -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-dark small mb-1">
                                Enforcement Status
                            </label>
                            <select name="illegal_compliance_status" class="form-select form-select-sm" style="border-radius: 6px; padding: 0.45rem 0.75rem;">
                                <option value="unresolved" selected>🔴 Unresolved (Notice Issued)</option>
                                <option value="pending_permit">🟡 Building Permit Filed</option>
                                <option value="resolved">🟢 Regularized / Permit Issued</option>
                            </select>
                        </div>

                        <!-- Photo Upload -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-dark small mb-1">
                                Site / Photo Evidence
                            </label>
                            <input type="file" name="photo" accept="image/*" class="form-control form-control-sm" style="border-radius: 6px; padding: 0.35rem 0.75rem;">
                        </div>
                    </div>
                </div>

                <!-- Modal Footer (Sticky Bottom Always Visible) -->
                <div class="modal-footer border-top p-3 d-flex align-items-center justify-content-between flex-shrink-0" style="background: var(--bg-surface, #f8fafc);">
                    <button type="button" class="btn btn-secondary action-btn action-btn-secondary px-3.5 py-2" data-bs-dismiss="modal" style="font-size: 0.8rem; border-radius: 6px;">
                        Cancel
                    </button>
                    <button type="submit" class="btn-flag-illegal">
                        <i data-lucide="shield-alert" style="width: 15px; height: 15px;"></i>
                        Flag Illegal Construction
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const m = document.getElementById('flagIllegalModal');
    if (m) document.body.appendChild(m);
});
</script>
